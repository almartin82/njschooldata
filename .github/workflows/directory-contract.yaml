# Template for each package's .github/workflows/directory-contract.yaml
# (mirrors the enrollment-contract workflow convention).
name: Directory contract

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

jobs:
  directory-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies and package
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: test

      - name: Run directory conformance suite (offline, fixture-backed)
        run: Rscript -e 'devtools::test(filter = "directory-contract", stop_on_failure = TRUE)'

      - name: Run directory live guard (skips offline)
        run: Rscript -e 'devtools::test(filter = "directory-live", stop_on_failure = TRUE)'

# Build & deploy the NJ District Profiles static site to gh-pages/profiles.
#
# MANUAL / SCHEDULED ONLY — never on push. The data build hits NJ DOE live and is
# heavy (~190 downloads), so it runs deliberately, not on every commit. This keeps
# it out of the repo's per-push CI (which is deploy-only) while isolating the
# network dependency to one explicit, infrequent job.
#
# Deploys into the `profiles/` subfolder of gh-pages. The pkgdown workflow deploys
# the package docs to the gh-pages root with clean:false, so the two coexist:
#   almartin82.github.io/njschooldata/           -> package pkgdown site
#   almartin82.github.io/njschooldata/profiles/  -> this district-profiles site
name: profiles

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Districts to build: 'all' or space-separated ids (e.g. 4900 3570)"
        required: false
        default: "all"
  schedule:
    - cron: "0 7 1 10 *"   # annually, Oct 1 (after fall enrollment publishes)

permissions:
  contents: write

concurrency:
  group: profiles-${{ github.run_id }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::DT
            any::devtools
            local::.

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Build per-district data bundles
        run: Rscript site/build-data.R ${{ github.event.inputs.scope || 'all' }}

      - name: Generate profile stubs
        run: Rscript site/render-all.R

      - name: Render Quarto site
        run: quarto render site

      - name: Deploy to gh-pages/profiles
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: site/_site
          target-folder: profiles
          clean: true
